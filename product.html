<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מוצר | עזר מציון</title>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/product-header.css">
  <link rel="stylesheet" href="./css/search-input.css">
  <link rel="stylesheet" href="./css/cart-button.css">
  <link rel="stylesheet" href="./css/cart-dropdown.css">
  <link rel="stylesheet" href="./css/product-availability.css">
  <link rel="stylesheet" href="./css/product-actions.css">
  <link rel="stylesheet" href="./css/availability-filters.css">
  <link rel="stylesheet" href="./css/availability-notice.css">
  <link rel="stylesheet" href="./css/availability-popup.css">
  <link rel="stylesheet" href="./css/technical-specifications.css">
  <link rel="stylesheet" href="./css/product-gallery.css">
  <link rel="stylesheet" href="./css/product-guides.css">
  <link rel="stylesheet" href="./css/product.css">
</head>
<body>
  <main>
    <section class="product-header" aria-label="פעולות מוצר">
      <div class="product-header__inner product-header__inner--cart-only">
        <div class="product-header__cart"></div>
      </div>
    </section>

    <div class="page-container product-page__container">
      <div class="product-page__content">
        <section
          class="product-page__details"
          aria-labelledby="product-page-title"
        >
          <div
            class="product-page__availability"
            aria-label="זמינות המוצר"
          ></div>

          <div class="product-header__heading">
            <h1
              id="product-page-title"
              class="product-header__title"
              aria-live="polite"
              aria-atomic="true"
            ></h1>
            <img
              class="product-header__line"
              src="./assets/icons/horizontal-line.svg"
              alt=""
              aria-hidden="true"
            >
          </div>

          <p class="product-page__description"></p>
          <div class="product-page__notice"></div>
          <p class="product-page__price"></p>
          <div class="product-page__actions"></div>
          <hr class="product-page__divider">
          <div class="product-page__technical-specifications"></div>
          <hr class="product-page__divider">
          <div class="product-page__guides"></div>
        </section>

        <div class="product-page__gallery"></div>
      </div>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
  <script src="./data/product-availability.js"></script>
  <script src="./data/locations.js"></script>
  <script src="./data/branches.js"></script>
  <script src="./data/products.js"></script>
  <script src="./js/utils/cart.js"></script>
  <script src="./js/utils/branch.js"></script>
  <script src="./js/components/cart-dropdown.js"></script>
  <script src="./js/components/cart-button.js"></script>
  <script src="./js/components/product-availability.js"></script>
  <script src="./js/components/product-actions.js"></script>
  <script src="./js/components/product-header.js"></script>
  <script src="./js/components/search-input.js"></script>
  <script src="./js/components/availability-filters.js"></script>
  <script src="./js/components/availability-notice.js"></script>
  <script src="./js/components/availability-popup.js"></script>
  <script src="./js/components/technical-specifications.js"></script>
  <script src="./js/components/product-gallery.js"></script>
  <script src="./js/components/product-guides.js"></script>
  <script src="./js/product.js"></script>
</body>
</html>
