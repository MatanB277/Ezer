<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>עזר מציון</title>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/product-header.css">
  <link rel="stylesheet" href="./css/search-input.css">
  <link rel="stylesheet" href="./css/cart-button.css">
  <link rel="stylesheet" href="./css/cart-dropdown.css">
  <link rel="stylesheet" href="./css/categories.css">
  <link rel="stylesheet" href="./css/availability-filters.css">
  <link rel="stylesheet" href="./css/availability-popup.css">
  <link rel="stylesheet" href="./css/products.css">
</head>
<body>
  <main>
    <section class="product-header">
      <div class="product-header__inner">
        <div class="product-header__heading">
          <h1
            class="product-header__title"
            aria-live="polite"
            aria-atomic="true"
          ></h1>
          <img
            class="product-header__line"
            src="./assets/icons/horizontal-line.svg"
            alt=""
            aria-hidden="true"
          >
        </div>

        <div class="product-header__actions">
          <div class="product-header__search"></div>
          <div class="product-header__cart"></div>
        </div>
      </div>
    </section>

    <div class="page-container">
    <section class="categories" aria-label="קטגוריות מוצרים">
      <button
        class="categories__arrow categories__arrow--right"
        type="button"
        data-scroll-direction="right"
        aria-label="גלילה ימינה"
        aria-controls="categories-list"
      >
        <img src="./assets/icons/arrow-left.svg" alt="" aria-hidden="true">
      </button>

      <div id="categories-list" class="categories__list"></div>

      <button
        class="categories__arrow categories__arrow--left"
        type="button"
        data-scroll-direction="left"
        aria-label="גלילה שמאלה"
        aria-controls="categories-list"
      >
        <img src="./assets/icons/arrow-left.svg" alt="" aria-hidden="true">
      </button>
    </section>

    <hr class="filters-divider">

    <section class="availability-filters" aria-labelledby="availability-title">
      <h2 id="availability-title" class="availability-filters__title">זמינות מוצרים</h2>
      <div class="availability-filters__list"></div>
    </section>

    <section class="products" aria-label="מוצרים">
      <div class="product_header_container">
        <div
          class="products__count"
          aria-live="polite"
          aria-atomic="true"
        ></div>
        <div class="products__sort"></div>
      </div>
      <div id="products-list" class="products__list"></div>
    </section>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
  <script src="./data/categories.js"></script>
  <script src="./data/product-availability.js"></script>
  <script src="./data/locations.js"></script>
  <script src="./data/products.js"></script>
  <script src="./js/utils/url.js"></script>
  <script src="./js/utils/product.js"></script>
  <script src="./js/utils/cart.js"></script>
  <script src="./js/components/product-header.js"></script>
  <script src="./js/components/search-input.js"></script>
  <script src="./js/components/cart-dropdown.js"></script>
  <script src="./js/components/cart-button.js"></script>
  <script src="./js/components/categories.js"></script>
  <script src="./js/components/availability-filters.js"></script>
  <script src="./js/components/availability-popup.js"></script>
  <script src="./js/components/products.js"></script>
  <script src="./js/script.js"></script>
</body>
</html>
